name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish AOT
        run: dotnet publish csharp/GetAvailability/GetAvailability.csproj -c Release -r win-x64

      - name: Prepare release assets
        shell: pwsh
        run: |
          $publishDir = 'csharp/GetAvailability/bin/Release/net10.0/win-x64/publish'
          $stageDir   = 'release-assets'
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null

          # AOT executable
          Copy-Item "$publishDir/GetAvailability.exe" "$stageDir/GetAvailability.exe"

          # PowerShell script
          Copy-Item 'get-availability.ps1' "$stageDir/get-availability.ps1"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/GetAvailability.exe
            release-assets/get-availability.ps1
