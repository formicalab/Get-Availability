name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Prepare release assets
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.VERSION }}'
          $stageDir = 'release-assets'
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null

          # PowerShell script — stamp version
          (Get-Content 'Functions/GetAvail/get-availability.ps1' -Raw) -replace "0\.0\.0-dev", $version |
            Set-Content "$stageDir/get-availability.ps1" -NoNewline

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/get-availability.ps1
