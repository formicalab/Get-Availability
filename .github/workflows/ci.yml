name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build csharp/GetAvailability/GetAvailability.csproj -c Release

      - name: Publish AOT
        run: dotnet publish csharp/GetAvailability/GetAvailability.csproj -c Release -r win-x64

      - name: Verify PS1 syntax
        shell: pwsh
        run: |
          $tokens = $null; $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
              'get-availability.ps1', [ref]$tokens, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.ToString() }
            exit 1
          }
          Write-Host 'PowerShell syntax OK'
